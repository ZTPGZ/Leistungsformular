name = "kama-mail-api"
main = "worker.js"
compatibility_date = "2026-05-02"
workers_dev = true

# Cloudflare Email Routing binding – kein externer Mail-Dienst nötig
[[send_email]]
name = "SEND_EMAIL"

[vars]
# Must match your frontend origin in production, e.g. "https://ztpgz.github.io"
ALLOWED_ORIGIN = "https://ztpgz.github.io"
# "dry-run" = akzeptiert Requests ohne Versand, "live" = echter Versand via Cloudflare send_email
MAIL_MODE = "live"
# Absender: Name und E-Mail einer auf der Domain konfigurierten Adresse
FROM_EMAIL = "KAMA Services <info@kama-services.eu>"
# Optional: shared token geprüft via Header x-mail-api-token
MAIL_API_TOKEN = ""
